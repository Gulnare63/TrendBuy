databaseChangeLog:
  - changeSet:
      id: 20251008
      author: Gulnare islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: wishlists
            columns:
              - column:
                  name: wishlist_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_wishlists_id
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: added_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

        # Eyni user + eyni məhsul yalnız 1 dəfə olsun
        - addUniqueConstraint:
            schemaName: ecommerce
            tableName: wishlists
            columnNames: user_id, product_id
            constraintName: uq_wishlists_user_product


        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: wishlists
            baseColumnNames: user_id
            referencedTableSchemaName: ecommerce
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_wishlists_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: wishlists
            baseColumnNames: product_id
            referencedTableSchemaName: ecommerce
            referencedTableName: products
            referencedColumnNames: product_id
            constraintName: fk_wishlists_product
            onDelete: RESTRICT

        - createIndex:
            schemaName: ecommerce
            tableName: wishlists
            indexName: idx_wishlists_user_time
            columns:
              - column:
                  name: user_id
              - column:
                  name: added_at

        - createIndex:
            schemaName: ecommerce
            tableName: wishlists
            indexName: idx_wishlists_product
            columns:
              - column:
                  name: product_id
