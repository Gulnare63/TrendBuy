databaseChangeLog:
  - changeSet:
      id: 20251004
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: product_reviews
            columns:
              - column:
                  name: review_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_product_reviews_id
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: rating
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: comment
                  type: TEXT


              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

        # Eyni user eyni məhsula bir dəfə rəy yaza bilsin
        - addUniqueConstraint:
            schemaName: ecommerce
            tableName: product_reviews
            columnNames: user_id, product_id
            constraintName: uq_product_reviews_user_product

        # rating 1..5 aralığında olsun
#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: product_reviews
#            constraintName: chk_product_reviews_rating_range
#            checkConstraint: "rating >= 1 AND rating <= 5"


#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: product_reviews
#            constraintName: chk_product_reviews_comment_not_blank
#            checkConstraint: "(comment IS NULL OR btrim(comment) <> '')"


        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: product_reviews
            baseColumnNames: user_id
            referencedTableSchemaName: ecommerce
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_product_reviews_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: product_reviews
            baseColumnNames: product_id
            referencedTableSchemaName: ecommerce
            referencedTableName: products
            referencedColumnNames: product_id
            constraintName: fk_product_reviews_product
            onDelete: CASCADE

        # İndekslər
        - createIndex:
            schemaName: ecommerce
            tableName: product_reviews
            indexName: idx_product_reviews_product_time
            columns:
              - column:
                  name: product_id
              - column:
                  name: created_at

        - createIndex:
            schemaName: ecommerce
            tableName: product_reviews
            indexName: idx_product_reviews_user
            columns:
              - column:
                  name: user_id

        - createIndex:
            schemaName: ecommerce
            tableName: product_reviews
            indexName: idx_product_reviews_active_time
            columns:
              - column:
                  name: is_active
              - column:
                  name: created_at
