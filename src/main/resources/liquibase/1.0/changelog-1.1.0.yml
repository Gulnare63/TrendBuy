databaseChangeLog:
  - changeSet:
      id: 20251003
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: product_images
            columns:
              - column:
                  name: image_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_product_images_id
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: image_url
                  type: VARCHAR(255)   # Uzun URL ehtiyacı varsa TEXT edə bilərsən
                  constraints:
                    nullable: false

              - column:
                  name: is_primary
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: sort_order
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

        # FK — schema ilə, məhsul silinərkən şəkillər də silinsin
        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: product_images
            baseColumnNames: product_id
            referencedTableSchemaName: ecommerce
            referencedTableName: products
            referencedColumnNames: product_id
            constraintName: fk_product_images_product
            onDelete: CASCADE


#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: product_images
#            constraintName: chk_product_images_url_not_blank
#            checkConstraint: "btrim(image_url) <> ''"


#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: product_images
#            constraintName: chk_product_images_sort_nonneg
#            checkConstraint: "sort_order >= 0"


        - addUniqueConstraint:
            schemaName: ecommerce
            tableName: product_images
            columnNames: product_id, image_url
            constraintName: uq_product_images_product_url


        - addUniqueConstraint:
            schemaName: ecommerce
            tableName: product_images
            columnNames: product_id, sort_order
            constraintName: uq_product_images_product_sort


        - createIndex:
            schemaName: ecommerce
            tableName: product_images
            indexName: uq_product_images_primary_per_product
            unique: true
            columns:
              - column:
                  name: product_id
            where: "is_primary = true"


        - createIndex:
            schemaName: ecommerce
            tableName: product_images
            indexName: idx_product_images_product_sort
            columns:
              - column:
                  name: product_id
              - column:
                  name: sort_order
