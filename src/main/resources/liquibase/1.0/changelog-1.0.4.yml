databaseChangeLog:
  - changeSet:
      id: 20251017
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: notifications
            columns:
              - column:
                  name: notification_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_notifications_id
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: message
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: notification_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false


#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: notifications
#            constraintName: chk_notifications_message_not_blank
#            checkConstraint: "btrim(message) <> ''"


        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: notifications
            baseColumnNames: user_id
            referencedTableSchemaName: ecommerce
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_notifications_user
            onDelete: CASCADE


        - createIndex:
            schemaName: ecommerce
            tableName: notifications
            indexName: idx_notifications_user_read_time
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_read
              - column:
                  name: created_at
