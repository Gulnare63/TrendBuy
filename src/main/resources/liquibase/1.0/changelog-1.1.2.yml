databaseChangeLog:
  - changeSet:
      id: 20251006
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: shipping_address
            columns:
              - column:
                  name: address_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_shipping_address_id
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: address
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: city
                  type: VARCHAR(100)

              - column:
                  name: postal_code
                  type: VARCHAR(20)

              - column:
                  name: is_default
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false


#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: shipping_address
#            constraintName: chk_shipping_address_not_blank
#            checkConstraint: "btrim(address) <> ''"


        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: shipping_address
            baseColumnNames: user_id
            referencedTableSchemaName: ecommerce
            referencedTableName: users
            referencedColumnNames: user_id
            constraintName: fk_shipping_address_user
            onDelete: CASCADE


        - createIndex:
            schemaName: ecommerce
            tableName: shipping_address
            indexName: uq_shipping_address_user_default
            unique: true
            columns:
              - column:
                  name: user_id
            where: "is_default = true"


        - createIndex:
            schemaName: ecommerce
            tableName: shipping_address
            indexName: idx_shipping_address_user_default
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_default

        - createIndex:
            schemaName: ecommerce
            tableName: shipping_address
            indexName: idx_shipping_address_user_time
            columns:
              - column:
                  name: user_id
              - column:
                  name: created_at
