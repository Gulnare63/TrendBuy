# src/main/resources/db/changelog/20251000-create-users.yaml
databaseChangeLog:
  - changeSet:
      id: 20251000
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_users_id
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    unique: true

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: full_name
                  type: VARCHAR(100)

              - column:
                  name: phone_number
                  type: VARCHAR(20)

              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: registration_date
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
