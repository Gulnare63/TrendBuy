databaseChangeLog:
  - changeSet:
      id: 20251010
      author: Gulnare Islamova
      changes:
        - createTable:
            schemaName: ecommerce
            tableName: order_items
            columns:
              - column:
                  name: order_item_id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: primary_order_items_id
                    nullable: false

              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: DECIMAL(12,2)
                  constraints:
                    nullable: false


        - addUniqueConstraint:
            schemaName: ecommerce
            tableName: order_items
            columnNames: order_id, product_id
            constraintName: uq_order_items_order_product

        # CHECK məhdudiyyətləri
#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: order_items
#            constraintName: chk_order_items_quantity_positive
#            checkConstraint: "quantity >= 1"

#        - addCheckConstraint:
#            schemaName: ecommerce
#            tableName: order_items
#            constraintName: chk_order_items_price_nonneg
#            checkConstraint: "price >= 0"

        # FK-lər — schema ilə və onDelete qaydaları
        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableSchemaName: ecommerce
            referencedTableName: orders
            referencedColumnNames: order_id
            constraintName: fk_order_items_order
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableSchemaName: ecommerce
            baseTableName: order_items
            baseColumnNames: product_id
            referencedTableSchemaName: ecommerce
            referencedTableName: products
            referencedColumnNames: product_id
            constraintName: fk_order_items_product
            onDelete: RESTRICT

        # İndekslər
        - createIndex:
            schemaName: ecommerce
            tableName: order_items
            indexName: idx_order_items_order
            columns:
              - column:
                  name: order_id

        - createIndex:
            schemaName: ecommerce
            tableName: order_items
            indexName: idx_order_items_product
            columns:
              - column:
                  name: product_id
